<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{brand}}</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/todo.css') }}"
    />
  </head>

  <body>
    <header class="topbar">
      <h2>Tasks</h2>

      <div class="controls">
        <input id="search" placeholder="Search tasks..." />

        <select id="filter">
          <option value="all">All</option>
          <option value="upcoming">Upcoming</option>
          <option value="complete">Completed</option>
          <option value="overdue">Overdue</option>
        </select>

        <button onclick="toggleView()">Toggle View</button>
      </div>
    </header>

    <section class="create-task">
      <input id="title" placeholder="Task title" />

      <input id="date" type="datetime-local" />

      <button onclick="saveTask()">Add Task</button>
    </section>

    <section id="tasks" class="grid-view"></section>

    <script src="{{ url_for('static', filename='js/todo.js') }}"></script>
  </body>
</html>
