<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - {{brand}}</title>

    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        margin: 0;
      }

      nav {
        display: flex;
        justify-content: space-between;
        padding: 20px 10%;
        background: #020617;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
      }

      .logo {
        color: #38bdf8;
      }

      .section {
        padding: 80px 10%;
      }

      .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 40px;
      }

      .card {
        background: #020617;
        padding: 20px;
        border-radius: 8px;
      }

      .card p {
        color: #94a3b8;
      }

      .card a {
        color: #38bdf8;
        text-decoration: none;
      }

      footer {
        text-align: center;
        padding: 30px;
        background: #020617;
        margin-top: 50px;
      }
    </style>
  </head>

  <body>
    <nav>
      <h2 class="logo">Mubeen</h2>

      <div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/skills">Skills</a>
        <a href="/contact">Contact</a>
      </div>
    </nav>

    <section class="section">
      <h1>Projects</h1>

      <div class="projects">
        <div class="card">
          <h3>Hello Web App</h3>
          <p>Simple Flask application with routing.</p>
          <a href="#">GitHub</a>
        </div>

        <div class="card">
          <h3>Todo App</h3>
          <p>Task manager using Flask and SQLAlchemy.</p>
          <a href="#">GitHub</a>
        </div>

        <div class="card">
          <h3>Blog Platform</h3>
          <p>Multi-user blogging system with authentication.</p>
          <a href="#">GitHub</a>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Mubeen</p>
    </footer>
  </body>
</html>
